<!DOCTYPE html>
<html lang="pt-br">
<head>
    <link rel="icon" href="logo-sem-fundo.png" type="image/x-icon">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CrazyDog - Taxas de Entrega</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg-dark: #23272f; --primary-orange: #f48c2e; --primary-green: #a3e635; }
        body { background-color: var(--bg-dark); color: white; }
        .input-field { background: #1a1d23; border: 1px solid #3a3f4b; color: white; outline: none; transition: all 0.2s; }
        .input-field:focus { border-color: var(--primary-orange); box-shadow: 0 0 0 2px rgba(244, 140, 46, 0.1); }
    </style>
</head>
<body class="p-6 bg-[#23272f] text-white font-sans">
    <div class="max-w-4xl mx-auto">
        <header class="flex justify-between items-center mb-10">
            <h1 class="text-2xl font-black uppercase italic text-[#f48c2e] flex items-center gap-3">
                <i data-lucide="truck"></i> Simulador de Frete
            </h1>
            <div class="flex gap-4">
                <a href="admin.html" class="text-xs bg-gray-700 px-4 py-2 rounded-lg hover:bg-gray-600 transition-all uppercase font-bold flex items-center">Voltar</a>
                <button onclick="logout()" class="text-xs bg-red-600 px-4 py-2 rounded-lg font-bold uppercase">Sair</button>
            </div>
        </header>

        <div class="bg-[#2d3139] p-8 rounded-3xl border border-gray-800 mb-10 shadow-2xl">
            <h2 id="titulo-form" class="text-[#a3e635] font-bold uppercase text-sm mb-6 italic">Calcular Nova Rota</h2>
            
            <form id="form-simulacao" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="flex gap-2 md:col-span-2">
                    <input type="text" id="cep" placeholder="CEP" class="w-1/3 bg-[#1a1d23] border border-gray-700 p-4 rounded-xl font-bold outline-none focus:border-[#a3e635]" onblur="buscarEnderecoViaCEP()">
                    <input type="text" id="rua" placeholder="Rua (Preenchida pelo CEP)" readonly class="flex-1 bg-[#1a1d23] border border-gray-700 p-4 rounded-xl font-bold text-gray-500 outline-none">
                </div>

                <input type="text" id="numero" placeholder="Número" class="bg-[#1a1d23] border border-gray-700 p-4 rounded-xl font-bold outline-none focus:border-[#f48c2e]">
                <input type="text" id="bairro_display" placeholder="Bairro" readonly class="bg-[#1a1d23] border border-gray-700 p-4 rounded-xl font-bold text-gray-500 outline-none">

                <button type="button" id="btn-calc-frete" onclick="atualizarFreteGoogle()" class="md:col-span-2 py-4 bg-[#a3e635] text-[#1a1d23] font-black uppercase rounded-2xl hover:scale-[1.01] transition-all shadow-lg">
                    Calcular Valor da Entrega
                </button>
            </form>
        </div>

        <div id="resultado-container" class="hidden grid grid-cols-1 gap-4 mb-20">
            <div class="bg-[#1a1d23] p-8 rounded-3xl border border-[#a3e635] flex justify-between items-center shadow-lg animate-in fade-in zoom-in duration-300">
                <div>
                    <div class="flex items-center gap-2">
                        <span id="res-bairro" class="font-black text-xl text-white uppercase italic">BAIRRO</span>
                        <span id="res-km" class="bg-[#f48c2e]/10 text-[#f48c2e] text-xs px-3 py-1 rounded-full font-black">0.0 KM</span>
                    </div>
                    <p id="res-endereco-completo" class="text-[10px] text-gray-500 uppercase mt-2 font-bold tracking-widest">Endereço Completo Aqui</p>
                </div>
                <div class="text-right">
                    <p class="text-[10px] text-gray-500 font-bold uppercase mb-1">Custo Estimado</p>
                    <span id="res-valor" class="text-4xl font-black text-[#a3e635]">R$ 0,00</span>
                </div>
            </div>
        </div>
    </div>

    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyC2N-XgovNRshXkA9XKgk-O0jwevjYhq5w&libraries=places"></script>
    <script>
        const ENDERECO_ORIGEM = "Rua Adão Mariano Gomes, 370 - Jardim Brasil, Itapetininga - SP";
        const VALOR_POR_KM = 4.00; 
        const MINIMO_FRETE = 5.00;

        async function buscarEnderecoViaCEP() {
            const cep = document.getElementById('cep').value.replace(/\D/g, '');
            if (cep.length !== 8) return;
            const response = await fetch(`https://viacep.com.br/ws/${cep}/json/`);
            const data = await response.json();
            if (!data.erro) {
                document.getElementById('rua').value = data.logradouro;
                document.getElementById('bairro_display').value = data.bairro;
                document.getElementById('numero').focus();
            }
        }

        async function calcularDistanciaFrete(enderecoDestino) {
            return new Promise((resolve) => {
                const service = new google.maps.DistanceMatrixService();
                service.getDistanceMatrix({
                    origins: ["Rua Adão Mariano Gomes, 370 - Jardim Brasil, Itapetininga - SP"],
                    destinations: [enderecoDestino],
                    travelMode: google.maps.TravelMode.DRIVING,
                }, (response, status) => {
                    if (status === "OK") {
                        const element = response.rows[0].elements[0];
                        if (element.status === "OK") {
                            const distanciaKm = element.distance.value / 1000;
                            let valorFinal = 0;

                            if (distanciaKm <= 1) {
                                valorFinal 
                                = Math.max(distanciaKm * 3.65, 5);
                            } 
                            else if (distanciaKm <= 2) {
                                valorFinal 
                                = Math.max(distanciaKm * 4.20, 5);
                            }
                            else if (distanciaKm <= 3) {
                                valorFinal 
                                = Math.max(distanciaKm * 3, 5);
                            }
                            else if (distanciaKm <= 4) {
                                valorFinal = 4 + (distanciaKm * 0.30);
                            }
                            else if (distanciaKm <= 5) {
                                valorFinal = 5 + (distanciaKm * 0.30);
                            }
                            else if (distanciaKm <= 6) {
                                valorFinal = 6 + (distanciaKm * 0.35);
                            }
                            else if (distanciaKm <= 7) {
                                valorFinal = 7 + (distanciaKm * 0.35);
                            }
                            else if (distanciaKm <= 8) {
                                valorFinal = 9 + (distanciaKm * 0.45); 
                            } 
                            else {
                                valorFinal = 10 + (distanciaKm * 0.40);
                            }

                            // Arredondamento para o teto (inteiro)
                            const valorArredondado = Math.ceil(valorFinal);

                            resolve({ 
                                sucesso: true, 
                                valor: valorArredondado, 
                                km: distanciaKm.toFixed(1) 
                            });
                        } else {
                            resolve({ sucesso: false, erro: "Endereço não localizado." });
                        }
                    } else {
                        resolve({ sucesso: false, erro: "Erro no Google: " + status });
                    }
                });
            });
        }

        async function atualizarFreteGoogle() {
            const rua = document.getElementById('rua').value;
            const num = document.getElementById('numero').value;
            const bairro = document.getElementById('bairro_display').value;
            
            if (!rua || !num) { alert("Preencha o CEP e o número!"); return; }

            const btn = document.getElementById('btn-calc-frete');
            btn.innerText = "CALCULANDO ROTA...";
            btn.disabled = true;

            const endereco = `${rua}, ${num} - ${bairro}, Itapetininga, SP`;
            const res = await calcularDistanciaFrete(endereco);

            if (res.sucesso) {
                document.getElementById('resultado-container').classList.remove('hidden');
                document.getElementById('res-bairro').innerText = bairro;
                document.getElementById('res-km').innerText = `${res.km} KM`;
                document.getElementById('res-valor').innerText = `R$ ${res.valor.toFixed(2)}`;
                document.getElementById('res-endereco-completo').innerText = endereco;
                
                btn.innerText = "CALCULAR NOVO FRETE";
            } else {
                alert(res.erro);
                btn.innerText = "TENTAR NOVAMENTE";
            }
            btn.disabled = false;
        }

        function logout() { 
            localStorage.removeItem('is_admin'); 
            window.location.href = "login.html"; 
        }

        lucide.createIcons();
    </script>
</body>
</html>
