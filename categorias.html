<!DOCTYPE html>
<html lang="pt-br">
<head>
    <link rel="icon" href="logo-sem-fundo.png" type="image/x-icon">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CrazyDog - Gestão de Categorias</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>

    <style>
        :root { --bg-dark: #23272f; --primary-orange: #f48c2e; --primary-green: #a3e635; }
        body { background-color: var(--bg-dark); color: white; }
        .input-field { background: #1a1d23; border: 1px solid #3a3f4b; color: white; }
        .sortable-ghost { opacity: 0.4; background: #f48c2e !important; }
        .drag-handle { cursor: grab; }
        .drag-handle:active { cursor: grabbing; }
    </style>
</head>
<body class="p-6">
    <div class="max-w-4xl mx-auto">
        <header class="flex justify-between items-center mb-10">
            <h1 class="text-2xl font-black uppercase italic text-[#f48c2e] flex items-center gap-3">
                <i data-lucide="layers"></i> Categorias
            </h1>
            <a href="admin.html" class="text-xs bg-gray-700 px-4 py-2 rounded-lg hover:bg-gray-600 transition-all uppercase font-bold">Voltar</a>
        </header>

        <div class="bg-[#2d3139] p-8 rounded-3xl border border-gray-800 mb-6 shadow-2xl">
            <h2 id="titulo-form-pai" class="text-[#a3e635] font-bold uppercase text-sm mb-6 italic">Nova Categoria</h2>
            <form id="form-pai" class="flex flex-col gap-4">
                <input type="hidden" id="pai-id" value="">
                
                <div class="flex flex-col md:flex-row gap-4">
                    <input type="text" id="nome-pai" placeholder="Nome (Ex: Lanches)" required 
                        class="flex-1 bg-[#1a1d23] border border-gray-700 p-4 rounded-xl font-bold outline-none focus:border-[#a3e635] text-white">
                    
                    <button type="submit" id="btn-submit-pai" class="bg-[#a3e635] text-[#1a1d23] px-8 py-4 font-black uppercase rounded-xl hover:scale-105 transition-all whitespace-nowrap">
                        Salvar
                    </button>
                    <button type="button" id="btn-cancelar-pai" onclick="resetarPai()" class="hidden bg-gray-600 text-white px-8 py-4 font-black uppercase rounded-xl hover:bg-gray-500 transition-all whitespace-nowrap">
                        Cancelar
                    </button>
                </div>

                <div class="flex items-center gap-3 px-2">
                    <input type="checkbox" id="visivel-pai" checked class="w-5 h-5 accent-[#a3e635] cursor-pointer rounded">
                    <label for="visivel-pai" class="text-xs font-bold uppercase tracking-widest text-gray-400 cursor-pointer">
                        Exibir esta categoria na tela inicial do cliente
                    </label>
                </div>
            </form>
        </div>

        <div class="mb-4 flex items-center gap-2 px-2 bg-[#2d3139] p-3 rounded-xl border border-gray-800 w-fit">
            <i data-lucide="info" class="w-4 h-4 text-[#a3e635]"></i>
            <p class="text-[10px] text-gray-400 font-bold uppercase tracking-wider">Arraste os itens para reordenar a lista.</p>
        </div>
        
        <div id="lista-categorias" class="flex flex-col gap-4 mb-20">
            <p class="text-gray-500 text-center text-sm font-bold uppercase py-4">Carregando categorias...</p>
        </div>
    </div>

    <script>
        const supabaseUrl = 'https://fxmivhmbilnfkxusaxid.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ4bWl2aG1iaWxuZmt4dXNheGlkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE4OTE1MjcsImV4cCI6MjA4NzQ2NzUyN30.dslzpVwwI3Kua52dS1JpD5SrbkSNm68dED7nToLw2nM';
        const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

        let categoriasLocais = [];
        window.sortablePai = null;

        async function carregarCategorias() {
            const { data, error } = await supabaseClient.from('categorias')
                .select('*')
                .order('ordem', { ascending: true })
                .order('nome', { ascending: true });
            
            if (error) return alert("Erro ao carregar: " + error.message);

            categoriasLocais = data;
            renderizarTela(data);
        }

        function renderizarTela(data) {
            const container = document.getElementById('lista-categorias');
            const principais = data.filter(c => !c.parent_id);

            if (principais.length === 0) {
                container.innerHTML = '<p class="text-gray-500 text-center uppercase font-bold text-xs mt-4">Nenhuma categoria cadastrada</p>';
                return;
            }

            container.innerHTML = principais.map(pai => `
                <div data-id="${pai.id}" class="bg-[#1a1d23] p-4 rounded-2xl border border-gray-700 shadow-lg flex flex-col gap-3 ${pai.visivel === false ? 'opacity-50 border-dashed' : ''}">
                    <div class="flex justify-between items-center">
                        <div class="flex items-center gap-3">
                            <div class="cursor-grab active:cursor-grabbing text-gray-500 hover:text-white handle-pai transition-colors">
                                <i data-lucide="grip-vertical"></i>
                            </div>
                            ${pai.visivel === false ? '<i data-lucide="eye-off" class="w-5 h-5 text-red-500"></i>' : '<i data-lucide="eye" class="w-5 h-5 text-[#a3e635]"></i>'}
                            <span class="font-black uppercase tracking-widest text-[#a3e635] text-lg ${pai.visivel === false ? 'line-through text-gray-500' : ''}">${pai.nome}</span>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="prepararEdicao(${pai.id}, '${pai.nome}', ${pai.visivel})" class="text-blue-400 hover:bg-blue-500/10 p-2 rounded-lg"><i data-lucide="pencil" class="w-5 h-5"></i></button>
                            <button onclick="deletarCategoria(${pai.id})" class="text-red-500 hover:bg-red-500/10 p-2 rounded-lg"><i data-lucide="trash-2" class="w-5 h-5"></i></button>
                        </div>
                    </div>
                </div>
            `).join('');
            
            lucide.createIcons();
            ativarDragAndDrop();
        }

        document.getElementById('form-pai').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('pai-id').value;
            const nome = document.getElementById('nome-pai').value.trim();
            const visivel = document.getElementById('visivel-pai').checked; // Lê a caixinha
            
            let requisicao;
            if (id) {
                // Agora manda o 'visivel' para o banco
                requisicao = await supabaseClient.from('categorias').update({ nome, parent_id: null, visivel }).eq('id', id);
            } else {
                const novaOrdem = categoriasLocais.length; 
                requisicao = await supabaseClient.from('categorias').insert([{ nome, ordem: novaOrdem, parent_id: null, visivel }]);
            }

            if (requisicao.error) alert("Erro: " + requisicao.error.message);
            else { resetarPai(); carregarCategorias(); }
        });

        // Recebe o terceiro parâmetro 'visivel'
        function prepararEdicao(id, nome, visivel) {
            document.getElementById('pai-id').value = id;
            document.getElementById('nome-pai').value = nome;
            // Se visivel for estritamente false, desmarca a caixa. Senão, marca.
            document.getElementById('visivel-pai').checked = visivel !== false; 
            
            document.getElementById('titulo-form-pai').innerText = "Editando Categoria";
            document.getElementById('btn-submit-pai').innerText = "Atualizar";
            document.getElementById('btn-cancelar-pai').classList.remove('hidden');
            document.getElementById('btn-submit-pai').classList.replace('bg-[#a3e635]', 'bg-blue-500');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function ativarDragAndDrop() {
            const containerPai = document.getElementById('lista-categorias');
            
            if(window.sortablePai) window.sortablePai.destroy();

            window.sortablePai = new Sortable(containerPai, {
                handle: '.handle-pai',
                animation: 150,
                ghostClass: 'sortable-ghost',
                onEnd: salvarNovaOrdemNoBanco
            });
        }

        async function salvarNovaOrdemNoBanco() {
            const atualizacoes = [];
            const paisNaTela = document.querySelectorAll('#lista-categorias > div[data-id]');
            
            paisNaTela.forEach((paiEl, indexPai) => {
                const paiId = paiEl.getAttribute('data-id');
                atualizacoes.push(supabaseClient.from('categorias').update({ ordem: indexPai }).eq('id', paiId));
            });

            await Promise.all(atualizacoes);
        }

        document.getElementById('form-pai').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('pai-id').value;
            const nome = document.getElementById('nome-pai').value.trim();
            
            let requisicao;
            if (id) {
                // Atualiza e garante que não tem parent_id
                requisicao = await supabaseClient.from('categorias').update({ nome, parent_id: null }).eq('id', id);
            } else {
                const novaOrdem = categoriasLocais.length; 
                requisicao = await supabaseClient.from('categorias').insert([{ nome, ordem: novaOrdem, parent_id: null }]);
            }

            if (requisicao.error) alert("Erro: " + requisicao.error.message);
            else { resetarPai(); carregarCategorias(); }
        });

        function prepararEdicao(id, nome) {
            document.getElementById('pai-id').value = id;
            document.getElementById('nome-pai').value = nome;
            document.getElementById('titulo-form-pai').innerText = "Editando Categoria";
            document.getElementById('btn-submit-pai').innerText = "Atualizar";
            document.getElementById('btn-cancelar-pai').classList.remove('hidden');
            document.getElementById('btn-submit-pai').classList.replace('bg-[#a3e635]', 'bg-blue-500');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function resetarPai() {
            document.getElementById('form-pai').reset();
            document.getElementById('pai-id').value = "";
            document.getElementById('titulo-form-pai').innerText = "Nova Categoria";
            document.getElementById('btn-submit-pai').innerText = "Salvar";
            document.getElementById('btn-cancelar-pai').classList.add('hidden');
            document.getElementById('btn-submit-pai').classList.replace('bg-blue-500', 'bg-[#a3e635]');
        }

        async function deletarCategoria(id) {
            if(confirm("Deseja remover esta categoria?")) {
                const { error } = await supabaseClient.from('categorias').delete().eq('id', id);
                if (error) alert("Erro ao deletar: " + error.message);
                else carregarCategorias();
            }
        }

        carregarCategorias();
    </script>
</body>
</html>
