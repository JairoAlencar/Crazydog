<!DOCTYPE html>
<html lang="pt-br">
<head>
    <link rel="icon" href="logo-sem-fundo.png" type="image/x-icon">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CrazyDog - Gestão de Cardápio</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>

    <style>
        :root { --bg-dark: #23272f; --primary-orange: #f48c2e; --primary-green: #a3e635; }
        body { background-color: var(--bg-dark); color: white; }
        .input-field { background: #1a1d23; border: 1px solid #3a3f4b; color: white; }
        .sortable-ghost { opacity: 0.4; background: #f48c2e !important; }
        .drag-handle { cursor: grab; }
        .drag-handle:active { cursor: grabbing; }
    </style>
</head>
<body class="p-6">
    <div class="max-w-4xl mx-auto">
        <header class="flex justify-between items-center mb-10">
            <h1 class="text-2xl font-black uppercase italic text-[#f48c2e]">Gestão de Cardápio</h1>
            <div class="flex gap-4">
                <a href="admin.html" class="text-xs bg-gray-700 px-4 py-2 rounded-lg hover:bg-gray-600 transition-all uppercase font-bold">Voltar</a>
                <button onclick="logout()" class="text-xs bg-red-600 px-4 py-2 rounded-lg font-bold uppercase">Sair</button>
            </div>
        </header>

        <div class="bg-[#2d3139] p-8 rounded-3xl border border-gray-800 mb-10 shadow-2xl">
            <h2 id="titulo-form" class="text-[#a3e635] font-bold uppercase text-sm mb-6">Cadastrar Novo Item</h2>
            <form id="form-produto" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <input type="hidden" id="edit-index" value="-1">
                
                <div class="md:col-span-2">
                    <label class="block text-xs font-bold uppercase text-[#a3e635] mb-2">Categoria</label>
                    <select id="categoria" onchange="toggleCampos()" class="input-field w-full p-4 rounded-xl outline-none">
                        <option value="Lanche">Lanche</option>
                        <option value="Doce">Doce</option>
                        <option value="Bebida">Bebida</option>
                        <option value="Adicional">Adicional</option>
                    </select>
                </div>

                <div class="md:col-span-1">
                    <label class="block text-xs font-bold uppercase text-[#a3e635] mb-2">Nome</label>
                    <input type="text" id="nome" placeholder="Nome do Item" required class="input-field w-full p-4 rounded-xl font-bold">
                </div>
                
                 <div class="md:col-span-1">
                    <label class="block text-xs font-bold uppercase text-[#a3e635] mb-2">Preço</label>
                    <input type="number" id="preco" placeholder="Preço (ex: 25.50)" step="0.01" required class="input-field w-full p-4 rounded-xl font-bold">
                </div>
                
                <div class="md:col-span-2" id="div-quantidade">
                    <label class="block text-xs font-bold uppercase text-[#a3e635] mb-2">Quantidade (Estoque)</label>
                    <input type="number" id="estoque" placeholder="Ex: 50" class="input-field w-full p-4 rounded-xl font-bold">
                </div>

                <div class="md:col-span-2 hidden" id="div-btn-sabores">
                    <button type="button" onclick="toggleModoSabores()" id="btn-toggle-sabores" class="text-[10px] bg-gray-800 text-[#a3e635] px-4 py-2 rounded-lg font-bold uppercase border border-gray-700 hover:bg-gray-700 transition-all flex items-center gap-2">
                        <i data-lucide="plus-circle" class="w-4 h-4"></i> Adicionar Múltiplos Sabores
                    </button>
                </div>

                <div class="md:col-span-2 hidden" id="div-subitens">
                    <label class="block text-xs font-bold uppercase text-[#a3e635] mb-2">Subitens (Sabores e Estoque)</label>
                    <div id="container-linhas-subitens" class="space-y-3"></div>                   
                    <p class="text-[10px] text-gray-500 mt-2">* Deixe o nome vazio para ignorar a linha.</p>
                </div>

                <div class="md:col-span-2">
                    <label id="label-imagem" class="block text-xs font-bold uppercase text-[#a3e635] mb-2">Foto (Arraste ou Clique)</label>
                    <input type="file" id="imagem_file" accept="image/*" class="input-field w-full p-4 rounded-xl border-dashed border-2 border-gray-600">
                    <p id="msg-imagem-edit" class="text-[10px] text-gray-500 mt-1 hidden">* Deixe vazio para manter a imagem atual</p>
                </div>

                <div class="md:col-span-2">
                    <label class="block text-xs font-bold uppercase text-[#a3e635] mb-2">Descrição</label>
                    <input type="text" id="desc" placeholder="Descrição Curta" required class="input-field w-full p-4 rounded-xl font-bold">
                </div>

                <div class="md:col-span-2">
                    <label class="block text-xs font-bold uppercase text-[#a3e635] mb-2">Tag</label>
                    <select id="tag" class="input-field w-full p-4 rounded-xl outline-none">
                        <option value="">Nenhuma</option>
                        <option value="lancamento">Lançamento</option>
                        <option value="destaque">Mais Vendido</option>
                        <option value="promocao">Promoção</option>
                    </select>
                </div>

                <button type="submit" id="btn-submit" class="md:col-span-2 py-4 bg-[#a3e635] text-[#1a1d23] font-black uppercase rounded-2xl hover:scale-[1.01] transition-all">
                    Salvar no Cardápio
                </button>
                <button type="button" id="btn-cancelar" onclick="cancelarEdicao()" class="hidden md:col-span-2 py-2 bg-gray-600 text-white font-bold uppercase rounded-xl">
                    Cancelar Edição
                </button>
            </form>
        </div>

        <div id="categorias-container" class="space-y-12 mb-20"></div>
    </div>

    <script>
        const supabaseUrl = 'https://fxmivhmbilnfkxusaxid.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ4bWl2aG1iaWxuZmt4dXNheGlkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE4OTE1MjcsImV4cCI6MjA4NzQ2NzUyN30.dslzpVwwI3Kua52dS1JpD5SrbkSNm68dED7nToLw2nM';
        const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

        const form = document.getElementById('form-produto');
        let lanches = [];

        async function carregarLanchesDoBanco() {
            const { data, error } = await supabaseClient
                .from('lanches')
                .select('*')
                .order('ordem', { ascending: true });
            
            if (!error) {
                lanches = data;
                renderCategoriasAdmin();
            }
        }

        let estadoSubitens = [{ nome: '', qtd: '' }];

        // Função que desenha as linhas na tela
        function renderizarLinhasSubitens() {
            const container = document.getElementById('container-linhas-subitens');
            
            container.innerHTML = estadoSubitens.map((linha, index) => {
                const isUltima = index === estadoSubitens.length - 1;
                
                return `
                <div class="flex gap-2 items-center">
                    <input type="text" placeholder="Sabor (Ex: Chocolate)" value="${linha.nome}" 
                        onchange="atualizarLinha(${index}, 'nome', this.value)" 
                        class="input-field flex-1 p-3 rounded-xl font-bold">
                        
                    <input type="number" placeholder="Qtd" value="${linha.qtd}" 
                        onchange="atualizarLinha(${index}, 'qtd', this.value)" 
                        class="input-field w-24 p-3 rounded-xl font-bold text-center">
                        
                    ${isUltima ? `
                        <button type="button" onclick="adicionarLinha()" class="bg-[#a3e635] text-[#1a1d23] w-12 h-12 rounded-xl flex items-center justify-center hover:scale-105 transition-all">
                            <i data-lucide="plus" class="w-5 h-5"></i>
                        </button>
                    ` : `
                        <button type="button" onclick="removerLinha(${index})" class="bg-red-600 text-white w-12 h-12 rounded-xl flex items-center justify-center hover:scale-105 transition-all">
                            <i data-lucide="trash-2" class="w-4 h-4"></i>
                        </button>
                    `}
                </div>`;
            }).join('');
            
            lucide.createIcons();
        }

        // Funções de controle
        function atualizarLinha(index, campo, valor) { estadoSubitens[index][campo] = valor; }
        function adicionarLinha() { estadoSubitens.push({ nome: '', qtd: '' }); renderizarLinhasSubitens(); }
        function removerLinha(index) { 
            estadoSubitens.splice(index, 1); 
            if(estadoSubitens.length === 0) estadoSubitens.push({ nome: '', qtd: '' }); // Mantém pelo menos 1
            renderizarLinhasSubitens(); 
        }

        function renderCategoriasAdmin() {
            const container = document.getElementById('categorias-container');
            const categorias = ['Lanche', 'Doce', 'Bebida', 'Adicional'];
            container.innerHTML = '';

            categorias.forEach(cat => {
                const itens = lanches.filter(l => l.categoria === cat);
                
                const section = document.createElement('div');
                
                // Cabeçalho da categoria
                let htmlContent = `
                    <div class="flex items-center gap-2 mb-4 border-b border-gray-700 pb-2">
                        <i data-lucide="layers" class="text-[#a3e635] w-4 h-4"></i>
                        <h3 class="text-sm font-black uppercase tracking-widest text-gray-400">${cat}</h3>
                    </div>
                    <div id="lista-${cat}" class="space-y-2">
                `;

                // Mapeia os itens e calcula o estoque dinamicamente
                htmlContent += itens.map(item => {
                    
                    // --- LÓGICA DE SOMA DO ESTOQUE ---
                    let estoqueExibicao = item.estoque || 0;
                    let detalhesSaboresHTML = ''; 

                    if (item.categoria === 'Doce' && item.subitens && item.subitens.trim() !== '') {
                        estoqueExibicao = item.subitens.split(',').reduce((total, par) => {
                            return total + (parseInt(par.split(':')[1]) || 0);
                        }, 0);

                        // Limpando as tags antigas e usando o " | " como separador
                        const saboresFormatados = item.subitens.split(',').map(par => {
                            const [nome, qtd] = par.split(':');
                            return `${nome.trim()}: ${qtd.trim()}`;
                        }).join(' | ');

                        // INJETANDO EXATAMENTE AS MESMAS CLASSES DO <P> DE CIMA
                        detalhesSaboresHTML = `<p class="text-[#a3e635] text-[10px] font-bold">${saboresFormatados}</p>`;
                    }
                    // ---------------------------------

                    return `
                        <div data-id="${item.id}" class="bg-[#1a1d23] p-4 rounded-2xl flex justify-between items-center border border-gray-800 shadow-sm">
                            <div class="flex items-center gap-4">
                                <div class="drag-handle text-gray-600 hover:text-white transition-colors">
                                    <i data-lucide="grip-vertical"></i>
                                </div>
                                <img src="${item.imagem}" class="w-10 h-10 rounded-lg object-cover">
                                <div>
                                    <p class="font-bold uppercase italic text-xs text-white">${item.nome}</p>
                                    <p class="text-[#a3e635] text-[10px] font-bold">R$ ${parseFloat(item.preco).toFixed(2)} | Total: ${estoqueExibicao}</p>
                                    ${detalhesSaboresHTML}
                                </div>
                            </div>
                            <div class="flex gap-1">
                                <button onclick="prepararEdicaoPeloId(${item.id})" class="text-blue-400 p-2 hover:bg-blue-500/10 rounded-lg">
                                    <i data-lucide="pencil" class="w-4 h-4"></i>
                                </button>
                                <button onclick="removerLanchePeloId(${item.id})" class="text-red-500 p-2 hover:bg-red-500/10 rounded-lg">
                                    <i data-lucide="trash-2" class="w-4 h-4"></i>
                                </button>
                            </div>
                        </div>
                    `;
                }).join('');

                htmlContent += `</div>`;
                section.innerHTML = htmlContent;
                container.appendChild(section);

                new Sortable(document.getElementById(`lista-${cat}`), {
                    animation: 150,
                    handle: '.drag-handle',
                    ghostClass: 'sortable-ghost',
                    onEnd: async function() {
                        await salvarNovaOrdem();
                    }
                });
            });
            
            lucide.createIcons();
        }

        // Variável de controle
        let modoSaboresAtivo = false;

        // 1. O botão que o utilizador clica (Este sim pode limpar dados)
        function toggleModoSabores() {
            modoSaboresAtivo = !modoSaboresAtivo;
            
            if (modoSaboresAtivo) {
                document.getElementById('estoque').value = 0; // O utilizador ligou os sabores, zeramos o stock geral
            } else {
                estadoSubitens = [{ nome: '', qtd: '' }]; // O utilizador desligou, limpamos as linhas
            }
            
            aplicarVisualModoSabores();
        }

        // 2. A função que apenas esconde e mostra as Divs (Sem apagar nada!)
        function aplicarVisualModoSabores() {
            const divQtde = document.getElementById('div-quantidade');
            const divSubitens = document.getElementById('div-subitens');
            const btnToggle = document.getElementById('btn-toggle-sabores');

            if (modoSaboresAtivo) {
                divQtde.classList.add('hidden');
                divSubitens.classList.remove('hidden');
                btnToggle.innerHTML = `<i data-lucide="minus-circle" class="w-4 h-4"></i> Voltar para Estoque Único`;
                btnToggle.classList.replace('text-[#a3e635]', 'text-red-400');
            } else {
                divQtde.classList.remove('hidden');
                divSubitens.classList.add('hidden');
                btnToggle.innerHTML = `<i data-lucide="plus-circle" class="w-4 h-4"></i> Adicionar Múltiplos Sabores`;
                btnToggle.classList.replace('text-red-400', 'text-[#a3e635]');
            }
            
            renderizarLinhasSubitens();
            lucide.createIcons();
        }

        // 3. O gatilho principal das categorias
        function toggleCampos() {
            const categoria = document.getElementById('categoria').value;
            const divBtnSabores = document.getElementById('div-btn-sabores');
            const divQtde = document.getElementById('div-quantidade');
            const divSubitens = document.getElementById('div-subitens');

            if (categoria === 'Doce') {
                divBtnSabores.classList.remove('hidden');
                aplicarVisualModoSabores(); // Apenas ajusta o visual, preservando a memória
            } else {
                divBtnSabores.classList.add('hidden');
                modoSaboresAtivo = false; 
                estadoSubitens = [{ nome: '', qtd: '' }];
                divQtde.classList.remove('hidden');
                divSubitens.classList.add('hidden');
                renderizarLinhasSubitens();
            }
        }
        async function salvarNovaOrdem() {
            const itensOrdenados = [];
            ['Lanche', 'Doce', 'Bebida', 'Adicional'].forEach(cat => {
                const lista = document.getElementById(`lista-${cat}`);
                if(lista) {
                    const rows = Array.from(lista.children);
                    rows.forEach((row, index) => {
                        itensOrdenados.push({ id: row.dataset.id, ordem: index });
                    });
                }
            });

            for (const item of itensOrdenados) {
                await supabaseClient.from('lanches').update({ ordem: item.ordem }).eq('id', item.id);
            }
        }

        form.addEventListener('submit', function(e) {
            e.preventDefault();
            const index = document.getElementById('edit-index').value;
            const file = document.getElementById('imagem_file').files[0];

            if (index == "-1" && !file) { alert("Selecione uma imagem!"); return; }

            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => salvarLanche(event.target.result, index);
                reader.readAsDataURL(file);
            } else {
                const item = lanches.find(l => l.id == index);
                salvarLanche(item.imagem, index);
            }
        });

        async function salvarLanche(imageData, editId) {
            const btn = document.getElementById('btn-submit');
            btn.disabled = true;
            btn.innerText = "Salvando...";

            // --- NOVA LÓGICA DE SUBITENS (Ajuste 3 A) ---
            // Pega as linhas, ignora as vazias e junta no formato "Chocolate:10, Ninho:3"
            const stringFinalSubitens = estadoSubitens
                .filter(linha => linha.nome && linha.nome.trim() !== '') 
                .map(linha => `${linha.nome.trim()}:${linha.qtd || 0}`)
                .join(', ');
            // --------------------------------------------

            const lancheData = {
                nome: document.getElementById('nome').value,
                preco: parseFloat(document.getElementById('preco').value),
                descricao: document.getElementById('desc').value,
                categoria: document.getElementById('categoria').value,
                imagem: imageData,
                estoque: parseInt(document.getElementById('estoque').value) || 0,
                
                // Substituímos a leitura do input pela string que acabamos de montar
                subitens: stringFinalSubitens, 
                
                tag: document.getElementById('tag').value
            };

            let error;
            if (editId == "-1") {
                const { error: insError } = await supabaseClient.from('lanches').insert([lancheData]);
                error = insError;
            } else {
                const { error: updError } = await supabaseClient.from('lanches').update(lancheData).eq('id', editId);
                error = updError;
            }

            if (!error) {
                cancelarEdicao();
                await carregarLanchesDoBanco();
            } else {
                alert("Erro ao salvar: " + error.message);
                btn.disabled = false;
                btn.innerText = "Salvar no Cardápio";
            }
        }

        function prepararEdicaoPeloId(id) {
            const item = lanches.find(l => l.id == id);
            document.getElementById('edit-index').value = id;
            document.getElementById('nome').value = item.nome;
            document.getElementById('preco').value = item.preco;
            document.getElementById('desc').value = item.descricao;
            document.getElementById('categoria').value = item.categoria;
            document.getElementById('estoque').value = item.estoque || 0;
            document.getElementById('tag').value = item.tag || "";
            
            // Análise da Base de Dados
            const stringDoBanco = item.subitens || '';
            
            if (stringDoBanco.trim() !== '') {
                modoSaboresAtivo = true; // Tem sabores, liga o modo!
                estadoSubitens = stringDoBanco.split(',').map(par => {
                    const [nome, qtd] = par.split(':');
                    return { nome: nome ? nome.trim() : '', qtd: qtd ? qtd.trim() : '' };
                });
            } else {
                modoSaboresAtivo = false; // É um doce simples (ou lanche), desliga o modo.
                estadoSubitens = [{ nome: '', qtd: '' }];
            }
            
            // Agora sim, pede para atualizar o ecrã com a informação carregada
            toggleCampos();

            document.getElementById('titulo-form').innerText = "Editando: " + item.nome;
            document.getElementById('btn-submit').innerText = "Atualizar";
            document.getElementById('btn-cancelar').classList.remove('hidden');
            document.getElementById('msg-imagem-edit').classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function cancelarEdicao() {
            form.reset();
            document.getElementById('edit-index').value = "-1";
            document.getElementById('tag').value = "";
            document.getElementById('titulo-form').innerText = "Cadastrar Novo Item";
            document.getElementById('btn-submit').innerText = "Salvar no Cardápio";
            document.getElementById('btn-submit').disabled = false;
            document.getElementById('btn-cancelar').classList.add('hidden');
            document.getElementById('msg-imagem-edit').classList.add('hidden');
            
            estadoSubitens = [{ nome: '', qtd: '' }];
            renderizarLinhasSubitens();
            toggleCampos();
        }

        async function removerLanchePeloId(id) {
            if(confirm("Deseja remover este item?")) {
                await supabaseClient.from('lanches').delete().eq('id', id);
                await carregarLanchesDoBanco();
            }
        }

        if (localStorage.getItem('is_admin') !== 'true') {
            window.location.href = "login.html";
        } else {
            carregarLanchesDoBanco();
        }

        function logout() {
            localStorage.removeItem('is_admin');
            window.location.href = "login.html";
        }
        toggleCampos();
        renderizarLinhasSubitens();
    </script>
</body>
</html>
